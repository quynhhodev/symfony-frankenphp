name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Start services
        run: docker compose -f compose.yml up -d --wait

      - name: Run migrations
        run: docker compose -f compose.yml exec -T apache php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Validate Doctrine schema
        run: docker compose -f compose.yml exec -T apache php bin/console doctrine:schema:validate
