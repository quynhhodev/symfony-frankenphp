apiVersion: apps/v1
kind: Deployment
metadata:
  name: frankenphp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frankenphp
  template:
    metadata:
      labels:
        app: frankenphp
    spec:
      containers:
      - name: frankenphp
        image: devho/franken-php:latest
        env:
          - name: DB_HOST
            value: "postgres-service" # Tên Service của Postgres
          - name: DB_PORT
            value: "5432"
          - name: DATABASE_URL
            value: "postgresql://postgres:mysecretpassword@postgres-service:5432/myapp_db?serverVersion=15&charset=utf8"
          - name: DB_USER
            value: "postgres"
          - name: DB_PASSWORD
            value: "mysecretpassword" # Trong thực tế nên dùng K8s Secrets
        envFrom:
          - configMapRef:
              name: frankenphp
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
      volumes:
      - name: frankenphp-volume
      imagePullSecrets:
      - name: regsecret



