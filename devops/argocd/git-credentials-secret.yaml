apiVersion: v1
kind: Secret
metadata:
  name: argocd-image-updater-git-creds
  namespace: argocd
type: Opaque
stringData:
  # Dùng GitHub Personal Access Token (PAT) hoặc SSH key để Image Updater
  # có quyền commit write-back lên repository

  # Option 1: GitHub Personal Access Token (HTTPS)
  username: quynhhodev
  password: <GITHUB_PERSONAL_ACCESS_TOKEN>

  # Option 2: SSH Private Key (uncomment nếu dùng SSH)
  # sshPrivateKey: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   <nội dung SSH private key>
  #   -----END OPENSSH PRIVATE KEY-----
