apiVersion: batch/v1
kind: Job
metadata:
  name: composer-install
  annotations:
    # Chạy trước khi ArgoCD sync deployment
    argocd.argoproj.io/hook: PreSync
    # Xóa job cũ trước khi tạo mới, tránh conflict
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: composer
          image: devho/franken-php:latest
          imagePullPolicy: Always
          workingDir: /app/public
          command:
            - composer
            - install
            # - --no-dev
            - --optimize-autoloader
            - --no-interaction
